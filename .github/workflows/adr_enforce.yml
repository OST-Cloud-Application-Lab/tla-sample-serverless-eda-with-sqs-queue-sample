name: Enforce architectural decisions

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ade:
    name: Run ADE to enforce architectural decisions
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0'

      - name: Install JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install ade
        run: go install github.com/phi42/ad-enforcement-tool/ade@v1.0.0

      - name: Install plugins
        run: |
          ade plugin install fscheck --repo github.com/phi42/ad-plugin-fscheck@v1.0.0
          ade plugin install netarchtest --repo github.com/phi42/ad-plugin-netarchtest@v1.0.0
          ade plugin install archunit --repo github.com/stefan-ka/ad-plugin-archunit@v0.1.0
          ade plugin list

      # ----------------------------------------------------------------------
      # Verify mode: run file-system checks directly, no test compilation.
      # ----------------------------------------------------------------------
      - name: Verify rules for all services (fscheck)
        run: ade verify -i docs/adr -p fscheck

      # ----------------------------------------------------------------------
      # Compile mode: generate test code and run it with the project's normal
      # test runner. Keep only the block that matches your language; delete or
      # comment out the rest.
      # ----------------------------------------------------------------------

      # .NET tests for TLA Manager (NetArchTest)
      - name: Compile rules (netarchtest)
        run: |
          ade compile -i docs/adr/AD0004-onion-manager.rule --config .ade-manager.yaml
          ade compile -i docs/adr/AD0007-functions-manager.rule --config .ade-manager.yaml
      - name: Run generated netarch tests
        run: dotnet test ./manager/src/TLAManager.Tests/TLAManager.Tests.csproj

      # Java tests for TLA Resolver (ArchUnit)
      - name: Compile rules (archunit)
        run: |
          ade compile -i docs/adr/AD0004-onion-resolver.rule --config .ade-resolver.yaml
      - name: Run generated archunit tests
        working-directory: ./resolver
        run: ./mvnw -B clean test --file pom.xml
      - uses: actions/cache@v5
        id: ad-cache-resolver-target
        with:
          path: resolver/target
          key: tla-sample-app-serverless-resolver-target-ad-${{ github.run_id }}
