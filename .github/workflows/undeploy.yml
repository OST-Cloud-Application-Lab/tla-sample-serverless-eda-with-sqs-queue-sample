name: Undeploy (manual)

on:
  workflow_dispatch:

jobs:
  undeploy_resolver:
    name: Undeploy Resolver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 25.x
        uses: actions/setup-node@v6
        with:
          node-version: 25.x
      - run: npm install -g serverless
      - run: serverless remove
        working-directory: resolver
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          TLA_SAMPLE_APP_SERVERLESS_ORG: ${{ secrets.TLA_SAMPLE_APP_SERVERLESS_ORG }}
          SLS_AWS_SDK: 3
  undeploy_reports:
    name: Undeploy Reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 25.x
        uses: actions/setup-node@v6
        with:
          node-version: 25.x
      - run: npm install -g serverless
      - run: serverless remove
        working-directory: reports
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          TLA_SAMPLE_APP_SERVERLESS_ORG: ${{ secrets.TLA_SAMPLE_APP_SERVERLESS_ORG }}
          SLS_AWS_SDK: 3
  undeploy_manager:
    name: Undeploy Manager
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 25.x
        uses: actions/setup-node@v6
        with:
          node-version: 25.x
      - run: npm install -g serverless
      - run: serverless remove
        working-directory: manager
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          TLA_SAMPLE_APP_SERVERLESS_ORG: ${{ secrets.TLA_SAMPLE_APP_SERVERLESS_ORG }}
          SLS_AWS_SDK: 3
  undeploy_infrastructure:
    name: Undeploy Infrastructure
    runs-on: ubuntu-latest
    needs:
      - undeploy_resolver
      - undeploy_manager
      - undeploy_reports
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 25.x
        uses: actions/setup-node@v6
        with:
          node-version: 25.x
      - run: npm install -g serverless
      - run: serverless remove
        working-directory: infrastructure
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          TLA_SAMPLE_APP_SERVERLESS_ORG: ${{ secrets.TLA_SAMPLE_APP_SERVERLESS_ORG }}
          SLS_AWS_SDK: 3
