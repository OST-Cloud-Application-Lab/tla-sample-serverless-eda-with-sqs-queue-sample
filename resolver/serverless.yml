org: ${env:TLA_SAMPLE_APP_SERVERLESS_ORG}
app: tla-resolver-serverless
service: tla-resolver-serverless
provider:
  name: aws
  region: us-east-1
  runtime: java21
  timeout: 10
  tracing:
    apiGateway: true
    lambda: true
  environment:
    TLA_TABLE_NAME: tla-resolver-table-${sls:stage}
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:Query
        - dynamodb:Scan
        - dynamodb:GetItem
        - dynamodb:BatchGetItem
        - dynamodb:PutItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
      Resource:
        - !GetAtt TLADynamoDBTable.Arn

package:
  artifact: target/tla-resolver-serverless-1.2-SNAPSHOT-aws.jar

resources:
  Resources:
    TLADynamoDBTable:
      Type: "AWS::DynamoDB::Table"
      Properties:
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: "name"
            AttributeType: "S"
        KeySchema:
          - AttributeName: "name"
            KeyType: "HASH"
        TableName: ${self:provider.environment.TLA_TABLE_NAME}
    TLAAcceptedRule:
      Type: AWS::Events::Rule
      Properties:
        EventBusName: ${cf:tla-infrastructure-serverless-${sls:stage}.TLAEventBusName}
        EventPattern:
          source:
            - "TLAManager"
          detail-type:
            - "TLA_Accepted"
        Name: tla-accepted-rule-${sls:stage}
        Targets:
          - Arn: !GetAtt
              - AcceptTlaLambdaFunction
              - Arn
            Id: tla_accepted
    PermissionInvokeLambda:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName: !Ref "AcceptTlaLambdaFunction"
        Action: "lambda:InvokeFunction"
        Principal: "events.amazonaws.com"
        SourceArn: !GetAtt
          - "TLAAcceptedRule"
          - "Arn"

functions:
  readAllTlaGroups:
    handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
    environment:
      SPRING_CLOUD_FUNCTION_DEFINITION: getAllTLAGroupsHandler
    snapStart: true
    events:
      - httpApi:
          path: /tlas
          method: get
  readAllTlas:
    handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
    environment:
      SPRING_CLOUD_FUNCTION_DEFINITION: getAllTLAsHandler
    snapStart: true
    events:
      - httpApi:
          path: /tlas/all/{name}
          method: get
  readTlaGroupByName:
    handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
    environment:
      SPRING_CLOUD_FUNCTION_DEFINITION: getTLAGroupByNameHandler
    snapStart: true
    events:
      - httpApi:
          path: /tlas/{groupName}
          method: get
  acceptTla:
    handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
    environment:
      SPRING_CLOUD_FUNCTION_DEFINITION: acceptTLAHandler
  seedDatabase:
    handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
    environment:
      SPRING_CLOUD_FUNCTION_DEFINITION: databaseSeedHandler
